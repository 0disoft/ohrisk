name: Publish npm package

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    environment: npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}."
            exit 1
          fi

      - name: Run release verification
        run: bun run verify:release

      - name: Check npm publish state
        id: npm_state
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm_state.outputs.already_published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm registry result
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          max_attempts=12
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            published_version="$(npm view "${package_name}" version 2>/dev/null || true)"
            if [ "$published_version" = "$package_version" ]; then
              npm view "${package_name}" dist.tarball
              exit 0
            fi

            echo "npm latest version ${published_version:-unavailable} does not match package.json version ${package_version}; retrying (${attempt}/${max_attempts})."
            sleep 5
            attempt=$((attempt + 1))
          done

          echo "::error::npm latest version ${published_version:-unavailable} does not match package.json version ${package_version} after ${max_attempts} attempts."
          exit 1

      - name: Write release notes
        run: |
          node --input-type=commonjs <<'NODE' > release-notes.md
          const fs = require("node:fs");
          const version = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8").replace(/\r\n/g, "\n");
          const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const startMatch = changelog.match(new RegExp(`^##\\s+${escapedVersion}\\b.*$`, "m"));
          if (!startMatch || startMatch.index === undefined) {
            throw new Error(`CHANGELOG.md does not contain a ${version} release section.`);
          }
          const start = startMatch.index;
          const next = changelog.slice(start + startMatch[0].length).search(/^##\s+/m);
          const end = next === -1 ? changelog.length : start + startMatch[0].length + next;
          process.stdout.write(changelog.slice(start, end).trim() + "\n");
          NODE

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
