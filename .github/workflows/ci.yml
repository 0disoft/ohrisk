name: Release Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and pack
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Show tool versions
        run: |
          bun --version
          node --version
          npm --version

      - name: Run release verification
        run: bun run verify:release
