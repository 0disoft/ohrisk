name: Ohrisk
description: Catch open-source license risk in GitHub Actions.

inputs:
  version:
    description: Bundled CLI version assertion. Use bundled or the exact CLI version shipped with this action.
    required: false
    default: bundled
  node-version:
    description: Node.js version used by the bundled Ohrisk CLI.
    required: false
    default: "24"
  setup-node:
    description: Run actions/setup-node before executing Ohrisk.
    required: false
    default: "true"
  command:
    description: "Ohrisk command to run: scan, ci, or diff."
    required: false
    default: ci
  baseline-ref:
    description: Git baseline ref required by command=diff.
    required: false
    default: ""
  profile:
    description: Risk profile.
    required: false
    default: saas
  prod:
    description: Exclude development-only dependencies.
    required: false
    default: "true"
  fail-on:
    description: Optional severity threshold for ohrisk ci or ohrisk diff. The CLI ci default remains high when empty.
    required: false
    default: ""
  lockfile:
    description: Supported repository-relative lockfile path to scan.
    required: false
    default: ""
  archive:
    description: Repository-relative ZIP, TAR, TAR.GZ, or TGZ project archive to scan without extracting it.
    required: false
    default: ""
  all:
    description: Discover and merge every supported lockfile at the selected project root.
    required: false
    default: "false"
  policy:
    description: Repository-relative Ohrisk policy file path.
    required: false
    default: ""
  format:
    description: Report format.
    required: false
    default: text
  output:
    description: Repository-relative report output path.
    required: false
    default: ""
  no-waivers:
    description: Ignore local .ohrisk-waivers.json files.
    required: false
    default: "false"
  strict-waivers:
    description: Fail when local waivers are expired or unmatched.
    required: false
    default: "false"
  offline:
    description: Disable remote evidence requests and use only local evidence or cache entries.
    required: false
    default: "false"
  cache-dir:
    description: Repository-relative persistent artifact cache directory.
    required: false
    default: ""
  jobs:
    description: Evidence collection concurrency from 1 to 64.
    required: false
    default: ""
  timeout:
    description: Per-request timeout such as 30s or 2m.
    required: false
    default: ""
  registry-url:
    description: HTTPS npm-compatible registry URL.
    required: false
    default: ""
  registry-token-env:
    description: Environment variable name containing a bearer token for registry-url.
    required: false
    default: ""
  allow-hosts:
    description: Comma- or newline-separated DNS hostnames explicitly allowed for artifact fetching.
    required: false
    default: ""

outputs:
  report-path:
    description: Report output path when the output input is set.
    value: ${{ steps.run.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Setup Node
      if: ${{ inputs.setup-node == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Verify bundled Ohrisk version
      shell: bash
      env:
        OHRISK_ACTION_PATH: ${{ github.action_path }}
        OHRISK_REQUESTED_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        version_output="$(node "${OHRISK_ACTION_PATH}/action-dist/cli.js" version)"
        read -r cli_name bundled_version extra <<< "$version_output"
        if [ "$cli_name" != "ohrisk" ] || [ -z "$bundled_version" ] || [ -n "${extra:-}" ]; then
          echo "::error::Bundled Ohrisk CLI returned an invalid version string."
          exit 1
        fi

        requested_version="$OHRISK_REQUESTED_VERSION"
        case "$requested_version" in
          ""|bundled) ;;
          v*) requested_version="${requested_version#v}" ;;
        esac

        if [ "$requested_version" != "" ] && [ "$requested_version" != "bundled" ]; then
          if [[ ! "$requested_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version must be bundled or an exact semantic version."
            exit 1
          fi
          if [ "$requested_version" != "$bundled_version" ]; then
            echo "::error::version ${requested_version} does not match bundled Ohrisk ${bundled_version}."
            exit 1
          fi
        fi

    - name: Run Ohrisk
      id: run
      shell: bash
      env:
        OHRISK_ACTION_PATH: ${{ github.action_path }}
        OHRISK_COMMAND: ${{ inputs.command }}
        OHRISK_BASELINE_REF: ${{ inputs.baseline-ref }}
        OHRISK_PROFILE: ${{ inputs.profile }}
        OHRISK_PROD: ${{ inputs.prod }}
        OHRISK_FAIL_ON: ${{ inputs.fail-on }}
        OHRISK_LOCKFILE: ${{ inputs.lockfile }}
        OHRISK_ARCHIVE: ${{ inputs.archive }}
        OHRISK_ALL: ${{ inputs.all }}
        OHRISK_POLICY: ${{ inputs.policy }}
        OHRISK_FORMAT: ${{ inputs.format }}
        OHRISK_OUTPUT: ${{ inputs.output }}
        OHRISK_NO_WAIVERS: ${{ inputs.no-waivers }}
        OHRISK_STRICT_WAIVERS: ${{ inputs.strict-waivers }}
        OHRISK_OFFLINE: ${{ inputs.offline }}
        OHRISK_CACHE_DIR: ${{ inputs.cache-dir }}
        OHRISK_JOBS: ${{ inputs.jobs }}
        OHRISK_TIMEOUT: ${{ inputs.timeout }}
        OHRISK_REGISTRY_URL: ${{ inputs.registry-url }}
        OHRISK_REGISTRY_TOKEN_ENV: ${{ inputs.registry-token-env }}
        OHRISK_ALLOW_HOSTS: ${{ inputs.allow-hosts }}
      run: |
        set -euo pipefail

        require_bool() {
          local name="$1"
          local value="$2"
          case "$value" in
            true|false) ;;
            *)
              echo "::error::${name} must be true or false."
              exit 1
              ;;
          esac
        }

        require_relative_workspace_path() {
          local name="$1"
          local value="$2"
          local normalized="${value//\\//}"

          if [ -z "$value" ]; then
            echo "::error::${name} must not be empty."
            exit 1
          fi

          if [[ "$normalized" == /* || "$normalized" =~ ^[A-Za-z]: ]]; then
            echo "::error::${name} must be a repository-relative path."
            exit 1
          fi

          case "$normalized" in
            "."|./*|*/.|*/./*|*//*|*/)
              echo "::error::${name} must not contain empty or . path segments."
              exit 1
              ;;
          esac

          IFS="/" read -r -a path_segments <<< "$normalized"
          for segment in "${path_segments[@]}"; do
            if [ "$segment" = ".." ]; then
              echo "::error::${name} must not contain .. path segments."
              exit 1
            fi
          done
        }

        require_relative_workspace_file() {
          local name="$1"
          local value="$2"
          local normalized="${value//\\//}"
          local current="."

          require_relative_workspace_path "$name" "$value"
          IFS="/" read -r -a path_segments <<< "$normalized"
          for segment in "${path_segments[@]}"; do
            current="${current}/${segment}"
            if [ -L "$current" ]; then
              echo "::error::${name} must stay inside the repository and must not traverse symbolic links."
              exit 1
            fi
          done
          if [ ! -f "$normalized" ]; then
            echo "::error::${name} must name a repository-relative regular file."
            exit 1
          fi
        }

        require_bool "prod" "$OHRISK_PROD"
        require_bool "all" "$OHRISK_ALL"
        require_bool "no-waivers" "$OHRISK_NO_WAIVERS"
        require_bool "strict-waivers" "$OHRISK_STRICT_WAIVERS"
        require_bool "offline" "$OHRISK_OFFLINE"

        if [ "$OHRISK_ALL" = "true" ] && [ -n "$OHRISK_LOCKFILE" ]; then
          echo "::error::all=true cannot be combined with lockfile."
          exit 1
        fi

        if [ -n "$OHRISK_ARCHIVE" ] && [ -n "$OHRISK_LOCKFILE" ]; then
          echo "::error::archive cannot be combined with lockfile."
          exit 1
        fi

        args=()
        case "$OHRISK_COMMAND" in
          scan|ci)
            if [ -n "$OHRISK_BASELINE_REF" ]; then
              echo "::error::baseline-ref can only be used with command=diff."
              exit 1
            fi
            args+=("$OHRISK_COMMAND")
            ;;
          diff)
            if [ -n "$OHRISK_ARCHIVE" ]; then
              echo "::error::archive is supported only with command=scan or command=ci."
              exit 1
            fi
            if [ -z "$OHRISK_BASELINE_REF" ]; then
              echo "::error::baseline-ref is required when command=diff."
              exit 1
            fi
            if [[ "$OHRISK_BASELINE_REF" == -* ]]; then
              echo "::error::baseline-ref must be a git ref, not a CLI option."
              exit 1
            fi
            args+=("diff" "$OHRISK_BASELINE_REF")
            ;;
          *)
            echo "::error::command must be scan, ci, or diff."
            exit 1
            ;;
        esac

        if [ "$OHRISK_COMMAND" = "diff" ] && [ "$OHRISK_NO_WAIVERS" = "true" ]; then
          echo "::error::no-waivers is not supported when command=diff."
          exit 1
        fi

        if [ "$OHRISK_COMMAND" != "ci" ] && [ "$OHRISK_STRICT_WAIVERS" = "true" ]; then
          echo "::error::strict-waivers requires command=ci."
          exit 1
        fi

        case "$OHRISK_PROFILE" in
          saas|distributed-app) args+=("--profile" "$OHRISK_PROFILE") ;;
          *)
            echo "::error::profile must be saas or distributed-app."
            exit 1
            ;;
        esac

        if [ "$OHRISK_PROD" = "true" ]; then
          args+=("--prod")
        fi

        if [ "$OHRISK_ALL" = "true" ]; then
          args+=("--all")
        fi

        if [ -n "$OHRISK_LOCKFILE" ]; then
          require_relative_workspace_path "lockfile" "$OHRISK_LOCKFILE"
          args+=("--lockfile" "$OHRISK_LOCKFILE")
        fi

        if [ -n "$OHRISK_ARCHIVE" ]; then
          require_relative_workspace_file "archive" "$OHRISK_ARCHIVE"
          args+=("--archive" "$OHRISK_ARCHIVE")
        fi

        if [ -n "$OHRISK_POLICY" ]; then
          require_relative_workspace_path "policy" "$OHRISK_POLICY"
          args+=("--policy" "$OHRISK_POLICY")
        fi

        case "$OHRISK_FORMAT" in
          text) ;;
          json|markdown) args+=("--${OHRISK_FORMAT}") ;;
          sarif|html|cyclonedx)
            if [ "$OHRISK_COMMAND" = "diff" ]; then
              echo "::error::format must be text, json, or markdown when command=diff."
              exit 1
            fi
            args+=("--${OHRISK_FORMAT}")
            ;;
          *)
            echo "::error::format must be text, json, sarif, markdown, html, or cyclonedx."
            exit 1
            ;;
        esac

        if [ -n "$OHRISK_OUTPUT" ]; then
          require_relative_workspace_path "output" "$OHRISK_OUTPUT"
          mkdir -p "$(dirname -- "$OHRISK_OUTPUT")"
          args+=("--output" "$OHRISK_OUTPUT")
          echo "report-path=$OHRISK_OUTPUT" >> "$GITHUB_OUTPUT"
        fi

        if [ "$OHRISK_NO_WAIVERS" = "true" ]; then
          args+=("--no-waivers")
        fi

        if [ "$OHRISK_STRICT_WAIVERS" = "true" ]; then
          args+=("--strict-waivers")
        fi

        if [ "$OHRISK_OFFLINE" = "true" ]; then
          args+=("--offline")
        fi

        if [ -n "$OHRISK_CACHE_DIR" ]; then
          require_relative_workspace_path "cache-dir" "$OHRISK_CACHE_DIR"
          args+=("--cache-dir" "$OHRISK_CACHE_DIR")
        fi

        if [ -n "$OHRISK_JOBS" ]; then
          if [[ ! "$OHRISK_JOBS" =~ ^[0-9]+$ ]]; then
            echo "::error::jobs must be an integer from 1 to 64."
            exit 1
          fi
          jobs_number=$((10#$OHRISK_JOBS))
          if [ "$jobs_number" -lt 1 ] || [ "$jobs_number" -gt 64 ]; then
            echo "::error::jobs must be an integer from 1 to 64."
            exit 1
          fi
          args+=("--jobs" "$OHRISK_JOBS")
        fi

        if [ -n "$OHRISK_TIMEOUT" ]; then
          args+=("--timeout" "$OHRISK_TIMEOUT")
        fi

        if [ -n "$OHRISK_REGISTRY_URL" ]; then
          args+=("--registry-url" "$OHRISK_REGISTRY_URL")
        fi

        if [ -n "$OHRISK_REGISTRY_TOKEN_ENV" ]; then
          if [[ ! "$OHRISK_REGISTRY_TOKEN_ENV" =~ ^[A-Za-z_][A-Za-z0-9_]*$ ]]; then
            echo "::error::registry-token-env must be an environment variable name."
            exit 1
          fi
          args+=("--registry-token-env" "$OHRISK_REGISTRY_TOKEN_ENV")
        fi

        if [ -n "$OHRISK_ALLOW_HOSTS" ]; then
          while IFS= read -r host; do
            host="${host#"${host%%[![:space:]]*}"}"
            host="${host%"${host##*[![:space:]]}"}"
            if [ -n "$host" ]; then
              args+=("--allow-host" "$host")
            fi
          done < <(printf '%s' "$OHRISK_ALLOW_HOSTS" | tr ',' '\n')
        fi

        if [ -n "$OHRISK_FAIL_ON" ]; then
          if [ "$OHRISK_COMMAND" = "scan" ]; then
            echo "::error::fail-on can only be used with command=ci or command=diff."
            exit 1
          fi
          case "$OHRISK_FAIL_ON" in
            high|unknown|review|low) args+=("--fail-on" "$OHRISK_FAIL_ON") ;;
            *)
              echo "::error::fail-on must be high, unknown, review, or low."
              exit 1
              ;;
          esac
        fi

        node "${OHRISK_ACTION_PATH}/action-dist/cli.js" "${args[@]}"
